<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partida</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/two-match.css">
</head>
<body>
    <main>
        <section class="partida-dados-jogadores pdj-o">
            <section class="partida-dados-pts">
                <div class="partida-dados-pts-simbolo">O</div>
                <div class="partida-dados-pts-jogador"><span id="dados-j2-nome">Jogador 2</span></div>
                <div class="partida-dados-pts-pontuacao"><span id="dados-j2-pts">0</span></div>
            </section>
            <section class="partida-vez">
                <p id="dados-j2-vez" class="opacity-oculto">Sua vez!</p>
            </section>
        </section>
        <section class="partida">
            <div id="a1" class="partida-area"></div>
            <div id="a2" class="partida-area"></div>
            <div id="a3" class="partida-area"></div>
            <div id="a4" class="partida-area"></div>
            <div id="a5" class="partida-area"></div>
            <div id="a6" class="partida-area"></div>
            <div id="a7" class="partida-area"></div>
            <div id="a8" class="partida-area"></div>
            <div id="a9" class="partida-area"></div>
        </section>
        <section class="partida-dados-jogadores pdj-x">
            <section class="partida-dados-pts">
                <div class="partida-dados-pts-simbolo">X</div>
                <div class="partida-dados-pts-jogador"><span id="dados-j1-nome">Jogador 1</span></div>
                <div class="partida-dados-pts-pontuacao"><span id="dados-j1-pts">0</span></div>
            </section>
            <section class="partida-vez">
                <p id="dados-j1-vez">Sua vez!</p>
            </section>
        </section>
    </main>

    <div id="empate-fade" class="fade oculto">
        <div id="empate-modal" class="modal">
            <p>Deu velha!</p>
            <button onclick="fecharModalVelha()">Nova rodada</button>
        </div>
    </div>

    <div id="vitoria-fade" class="fade oculto">
        <div id="vitoria-modal" class="modal">
            <p id="vitoria-modal-p">[Jogador] venceu a melhor de [melhorDe]</p>
            <div>
                <button onclick="novaPartida()">Jogar de novo</button>
                <button>Ver partida</button>
                <button>Menu principal</button>
            </div>
        </div>
    </div>

    <script src="../scripts/two-players.js"></script>
</body>
</html>
